services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: node_modules
        target: /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://neondb_owner:npg_xKuhYPnEaJ46@ep-polished-pond-a4vuv5zd-pooler.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SESSION_SECRET=24e76e0d37d14c7716cbd630a531dfd7eaa71d13ddf4bde43a73cdfb97aa89dc
      - HOST=0.0.0.0
    depends_on:
      - db
    command: npm run dev

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sirenda_hire
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data

volumes:
  node_modules:
  postgres_data: 